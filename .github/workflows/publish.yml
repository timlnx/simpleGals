name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify tag matches VERSION
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          [ "$TAG" = "$(cat VERSION)" ] || {
            echo "::error::Release tag '$TAG' does not match VERSION '$(cat VERSION)'. Bump VERSION before tagging."
            exit 1
          }
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build package
        run: pip install build && python -m build
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi-prod
    permissions:
      id-token: write
      contents: write   # required to attach assets to the GitHub Release
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Attach release artifacts to GitHub Release
        # The .publish.attestation files are the release provenance (what a
        # Scorecard Signed-Releases check inspects); the publish step above
        # generates them in dist/ alongside the wheel and sdist.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" \
            dist/simplegals-*.whl \
            dist/simplegals-*.tar.gz \
            dist/simplegals-*.publish.attestation \
            --clobber --repo "$GITHUB_REPOSITORY"

  notify-site:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Trigger the demo site rebuild
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.SITE_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/simpleGals/simplegals.github.io/dispatches \
            -d '{"event_type":"simplegals-release"}'
