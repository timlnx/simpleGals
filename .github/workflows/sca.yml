---
name: SCA Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions: read-all

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install project (runtime + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Audit installed dependencies with pip-audit
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          # local: true audits the resolved editable install (runtime + dev),
          # not a dev-only requirements file. Every dependency is a hard gate
          # except the pillow CVEs documented below.
          local: true
          # term-image caps pillow <12 transitively (0.7.2 requires pillow<11),
          # so pillow cannot reach the 12.1.1+ fix for these advisories. Accept
          # them (tracked) until term-image supports pillow>=12; drop this list
          # then. Every other dependency still hard-fails the job.
          ignore-vulns: |
            PYSEC-2026-165
            CVE-2026-25990
            CVE-2026-40192
            CVE-2026-42309
            CVE-2026-42310
            CVE-2026-42311
